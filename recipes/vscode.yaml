id: install-vscode
triggers:
  - install vscode
  - install visual studio code
  - setup vscode
  - get vscode
  - install vs code
name: Install VS Code
summary: Installing Visual Studio Code via the official Microsoft repository
source: official
url: https://code.visualstudio.com/docs/setup/linux
steps:
  - title: Install dependencies
    explanation: Installs packages required to add Microsoft's apt repository
    command: sudo apt update && sudo apt install -y wget gpg

  - title: Add Microsoft GPG key
    explanation: Adds Microsoft's signing key to verify VS Code packages
    command: wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > packages.microsoft.gpg && sudo install -D -o root -g root -m 644 packages.microsoft.gpg /etc/apt/keyrings/packages.microsoft.gpg && rm packages.microsoft.gpg

  - title: Add VS Code repository
    explanation: Registers Microsoft's official apt repository
    command: echo "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" | sudo tee /etc/apt/sources.list.d/vscode.list > /dev/null

  - title: Install VS Code
    explanation: Installs the latest stable version of VS Code
    command: sudo apt update && sudo apt install -y code